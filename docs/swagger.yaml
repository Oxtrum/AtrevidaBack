        Param: id (requerido, path). Body: nombre (opcional), categoria (opcional),
        tiempo HH:MM (opcional), costo (opcional), sesiones (opcional), tipo_espacio_requerido
        M/B (opcional), requiere_evaluacion true/false (opcional), activo true/false
        (opcional). Response: mensaje string.'
      parameters:
      - description: ID del servicio
        example: 8
        in: path
        name: id
        required: true
        type: integer
      - description: Campos a actualizar (todos opcionales, al menos uno requerido)
        in: body
        name: payload
        required: true
