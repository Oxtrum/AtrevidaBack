          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Pago no encontrado
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Obtener pago por codigo
      tags:
