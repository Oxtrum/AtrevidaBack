basePath: /
definitions:
  handlers.activarServicioRequest:
    properties:
      local:
        example: PASEO ARANJUEZ
        type: string
    required:
    - local
    type: object
  handlers.actualizarClienteRequest:
    properties:
      apellido:
        example: Lopez Aguilar
        type: string
      nombre:
        example: Maria Fernanda
        type: string
      numero_telefono:
        example: "+59170011224"
        type: string
    type: object
  handlers.actualizarEstadoReservaPGRequest:
    properties:
      causa:
        example: Cliente confirmo por WhatsApp
        type: string
      estado:
        example: AGENDADO
        type: string
      id:
        example: 44
        type: integer
      precio:
        example: 350
        type: number
      servicio_confirmado:
        example: Depilacion Laser Piernas
        type: string
      tipo:
        example: M
        type: string
    required:
    - estado
    - id
    type: object
  handlers.actualizarLocalHorarioRequest:
    properties:
      dia_semana:
        example: 6
        type: integer
      hora_desde:
        example: "10:00"
        type: string
      hora_hasta:
        example: "16:00"
        type: string
    type: object
  handlers.actualizarLocalRequest:
    properties:
      activo:
        example: true
        type: boolean
      nombre:
        example: PASEO ARANJUEZ
        type: string
    type: object
  handlers.actualizarReservaPGRequest:
    properties:
      id:
        example: 44
        type: integer
      local:
        example: SAN MARTIN
        type: string
      nueva_fecha:
        example: "2026-05-24"
        type: string
      nueva_hora_desde:
        example: "16:00"
        type: string
      nueva_hora_hasta:
        example: "17:00"
        type: string
      nuevas_notas:
        example: Reagendada por solicitud del cliente
        type: string
      nuevo_numero_telefono:
        example: "+59170011224"
        type: string
      nuevo_precio:
        example: 180
        type: number
      nuevo_servicio:
        example: Evaluacion corporal
        type: string
      nuevo_servicio_confirmado:
        example: Evaluacion corporal
        type: string
      nuevo_servicio_solicitado:
        example: Evaluacion corporal
        type: string
      nuevo_tipo:
        example: B
        type: string
    required:
    - id
    - local
    type: object
  handlers.actualizarReservaRequest:
    properties:
      cliente:
        example: Maria Lopez
        type: string
      dia:
        example: lunes
        type: string
      hora:
        example: "09:00"
        type: string
      local:
        example: SAN MARTIN
        type: string
      nueva_hora_desde:
        example: "11:00"
        type: string
      nueva_hora_hasta:
        example: "12:00"
        type: string
      nuevo_dia:
        example: martes
        type: string
      nuevo_servicio:
        example: Evaluacion corporal
        type: string
      nuevo_tipo:
        example: B
        type: string
      semana:
        example: "2026-05-25"
        type: string
      tipo:
        example: M
        type: string
    required:
    - cliente
    - dia
    - hora
    - local
    - semana
    - tipo
    type: object
  handlers.actualizarServicioRequest:
    properties:
      activo:
        example: true
        type: boolean
      categoria:
        example: Corporal
        type: string
      costo:
        example: 420
        type: number
      nombre:
        example: Depilacion Laser Piernas Premium
        type: string
      requiere_evaluacion:
        example: false
        type: boolean
      sesiones:
        example: 8
        type: integer
      tiempo:
        example: "01:15"
        type: string
      tipo_espacio_requerido:
        example: M
        type: string
    type: object
  handlers.categoriaListResponse:
    properties:
      categorias:
        items:
          $ref: '#/definitions/models.CategoriaPG'
        type: array
      total:
        type: integer
    type: object
  handlers.clienteFiltrosResponse:
    properties:
      apellido:
        type: string
      nombre:
        type: string
      numero_telefono:
        type: string
    type: object
  handlers.clienteItemResponse:
    properties:
      cliente:
        $ref: '#/definitions/models.ClientePG'
    type: object
  handlers.clienteListResponse:
    properties:
      clientes:
        items:
          $ref: '#/definitions/models.ClientePG'
        type: array
      filtros:
        $ref: '#/definitions/handlers.clienteFiltrosResponse'
      total:
        type: integer
    type: object
  handlers.comboFiltrosResponse:
    properties:
      categoria:
        type: string
      local:
        type: string
      nombre:
        type: string
      sesiones:
        type: integer
    type: object
  handlers.comboListResponse:
    properties:
      combos:
        items:
          $ref: '#/definitions/models.ComboItem'
        type: array
      filtros:
        $ref: '#/definitions/handlers.comboFiltrosResponse'
      total:
        type: integer
    type: object
  handlers.crearCategoriaRequest:
    properties:
      nombre:
        example: Depilacion Laser
        type: string
    required:
    - nombre
    type: object
  handlers.crearClienteRequest:
    properties:
      apellido:
        example: Lopez
        type: string
      nombre:
        example: Maria
        type: string
      numero_telefono:
        example: "+59170011223"
        type: string
    type: object
  handlers.crearLocalHorarioRequest:
    properties:
      dia_semana:
        example: 1
        type: integer
      hora_desde:
        example: "09:00"
        type: string
      hora_hasta:
        example: "18:00"
        type: string
      local_id:
        example: 3
        type: integer
    type: object
  handlers.crearLocalRequest:
    properties:
      espacios:
        description: opcional
        items:
          $ref: '#/definitions/handlers.espacioRequest'
        type: array
      nombre:
        example: SAN MARTIN
        type: string
    required:
    - nombre
    type: object
  handlers.crearReservaPGRequest:
    properties:
      cliente:
        example: Maria Lopez
        type: string
      estado:
        example: PENDIENTE
        type: string
      fecha:
        example: "2026-05-23"
        type: string
      hora_desde:
        example: "15:00"
        type: string
      hora_hasta:
        example: "16:00"
        type: string
      local:
        example: SAN MARTIN
        type: string
      notas:
        example: Primera sesion del plan
        type: string
      numero_telefono:
        example: "+59170011223"
        type: string
      plan_id:
        example: 21
        type: integer
      precio:
        example: 350
        type: number
      servicio:
        example: Depilacion laser
        type: string
      servicio_confirmado:
        example: Depilacion Laser Piernas
        type: string
      servicio_solicitado:
        example: Piernas completas
        type: string
      tipo:
        example: M
        type: string
    required:
    - cliente
    - fecha
    - hora_desde
    - local
    - numero_telefono
    type: object
  handlers.crearReservaRequest:
    properties:
      cliente:
        example: Maria Lopez
        type: string
      dia:
        example: lunes
        type: string
      hora_desde:
        example: "09:00"
        type: string
      hora_hasta:
        example: "10:00"
        type: string
      local:
        example: SAN MARTIN
        type: string
      semana:
        example: "2026-05-25"
        type: string
      servicio:
        example: Depilacion piernas completas
        type: string
      tipo:
        example: M
        type: string
    required:
    - cliente
    - dia
    - hora_desde
    - local
    - semana
    - tipo
    type: object
  handlers.crearServicioRequest:
    properties:
      categoria:
        example: Corporal
        type: string
      costo:
        example: 350
        type: number
      local:
        description: opcional
        example: SAN MARTIN
        type: string
      nombre:
        example: Depilacion Laser Piernas
        type: string
      requiere_evaluacion:
        example: true
        type: boolean
      sesiones:
        example: 6
        type: integer
      tiempo:
        example: "01:00"
        type: string
      tipo_espacio_requerido:
        description: '"M" | "B" | nil'
        example: M
        type: string
    required:
    - categoria
    - nombre
    type: object
  handlers.espacioRequest:
    properties:
      cantidad_espacios:
        example: 6
        minimum: 1
        type: integer
      tipo_espacio:
        example: M
        type: string
    required:
    - cantidad_espacios
    - tipo_espacio
    type: object
  handlers.horarioFiltrosResponse:
    properties:
      dia_semana:
        type: integer
      local_id:
        type: integer
    type: object
  handlers.horarioItemResponse:
    properties:
      horario:
        $ref: '#/definitions/models.LocalHorarioPG'
    type: object
  handlers.horarioListResponse:
    properties:
      filtros:
        $ref: '#/definitions/handlers.horarioFiltrosResponse'
      horarios:
        items:
          $ref: '#/definitions/models.LocalHorarioPG'
        type: array
      total:
        type: integer
    type: object
  handlers.idResponse:
    properties:
      id:
        type: integer
    type: object
  handlers.importResponse:
    properties:
      categorias:
        type: integer
      combo_locales:
        type: integer
      combo_servicios:
        type: integer
      combos:
        type: integer
      servicio_locales:
        type: integer
      servicios:
        type: integer
    type: object
  handlers.localItemResponse:
    properties:
      local:
        $ref: '#/definitions/models.LocalConEspacios'
      total:
        type: integer
    type: object
  handlers.localListResponse:
    properties:
      locales:
        items:
          $ref: '#/definitions/models.LocalConEspacios'
        type: array
      total:
        type: integer
    type: object
  handlers.messageResponse:
    properties:
      mensaje:
        type: string
    type: object
  handlers.reservaCalendarioResponse:
    properties:
      filtros:
        $ref: '#/definitions/handlers.reservaPGFiltrosResponse'
      reservas:
        items:
          $ref: '#/definitions/models.LocalReservas'
        type: array
      total_locales:
        type: integer
    type: object
  handlers.reservaCreatedResponse:
    properties:
      id:
        type: integer
      mensaje:
        type: string
    type: object
  handlers.reservaFiltrosResponse:
    properties:
      cliente:
        type: string
      dia:
        type: string
      local:
        type: string
      reservados:
        type: boolean
      semana:
        type: string
      tipo:
        type: string
    type: object
  handlers.reservaItemResponse:
    properties:
      reserva:
        $ref: '#/definitions/services.ReservaSimple'
    type: object
  handlers.reservaListResponse:
    properties:
      filtros:
        $ref: '#/definitions/handlers.reservaFiltrosResponse'
      reservas:
        items:
          $ref: '#/definitions/models.LocalReservas'
        type: array
      total_locales:
        type: integer
    type: object
  handlers.reservaPGFiltrosResponse:
    properties:
      cliente:
        type: string
      estado:
        type: string
      fecha:
        type: string
      fecha_desde:
        type: string
      fecha_hasta:
        type: string
      local:
        type: string
      numero_telefono:
        type: string
      reservados:
        type: boolean
      servicio_confirmado:
        type: string
      servicio_solicitado:
        type: string
      tipo:
        type: string
    type: object
  handlers.reservaResumenResponse:
    properties:
      reservas_agendadas_dia:
        type: integer
      semana:
        $ref: '#/definitions/handlers.reservaResumenSemanaResponse'
      servicios_completados_dia:
        type: integer
    type: object
  handlers.reservaResumenSemanaResponse:
    properties:
      jueves:
        type: integer
      lunes:
        type: integer
      martes:
        type: integer
      miercoles:
        type: integer
      sabado:
        type: integer
      total_reservas:
        type: integer
      viernes:
        type: integer
    type: object
  handlers.reservaSimpleListResponse:
    properties:
      reservas:
        items:
          $ref: '#/definitions/services.ReservaSimple'
        type: array
      total:
        type: integer
    type: object
  handlers.servicioFiltrosResponse:
    properties:
      categoria:
        type: string
      local:
        type: string
      nombre:
        type: string
      requiere_evaluacion:
        type: boolean
      sesiones:
        type: integer
    type: object
  handlers.servicioItemResponse:
    properties:
      servicio:
        $ref: '#/definitions/models.ServicioItem'
    type: object
  handlers.servicioListResponse:
    properties:
      filtros:
        $ref: '#/definitions/handlers.servicioFiltrosResponse'
      servicios:
        items:
          $ref: '#/definitions/models.ServicioItem'
        type: array
      total:
        type: integer
    type: object
  handlers.slotsResponse:
    properties:
      slots_error:
        items:
          type: string
        type: array
      slots_ok:
        items:
          type: string
        type: array
    type: object
  models.CategoriaPG:
    properties:
      id:
        type: integer
      nombre:
        type: string
    type: object
  models.ClientePG:
    properties:
      apellido:
        type: string
      id:
        type: integer
      nombre:
        type: string
      numero_telefono:
        type: string
    type: object
  models.ComboItem:
    properties:
      categoria:
        type: string
      costo_total:
        type: string
      local:
        type: string
      nombre:
        type: string
      servicios_incluidos:
        items:
          $ref: '#/definitions/models.ServicioIncluido'
        type: array
      sesiones_totales:
        type: integer
    type: object
  models.LocalConEspacios:
    properties:
      activo:
        type: boolean
      espacios:
        items:
          $ref: '#/definitions/models.TipoEspacioLocal'
        type: array
      horarios:
        items:
          $ref: '#/definitions/models.LocalHorarioPG'
        type: array
      id:
        type: integer
      nombre:
        type: string
    type: object
  models.LocalHorarioPG:
    properties:
      activo:
        type: boolean
      dia_semana:
        type: integer
      hora_desde:
        type: string
      hora_hasta:
        type: string
      id:
        type: integer
      local_id:
        type: integer
    type: object
  models.LocalReservas:
    properties:
      local:
        type: string
      semanas:
        items:
          $ref: '#/definitions/models.Semana'
        type: array
    type: object
  models.ReservaItem:
    properties:
      cliente:
        type: string
      estado:
        type: string
      numero_telefono:
        type: string
      servicio:
        type: string
      servicio_confirmado:
        type: string
      servicio_solicitado:
        type: string
      tipo:
        type: string
    type: object
  models.ReservaSlot:
    properties:
      dias:
        additionalProperties:
          items:
            $ref: '#/definitions/models.ReservaItem'
          type: array
        type: object
      hora:
        type: string
    type: object
  models.Semana:
    properties:
      reservas:
        items:
          $ref: '#/definitions/models.ReservaSlot'
        type: array
      titulo:
        type: string
    type: object
  models.ServicioIncluido:
    properties:
      costo:
        type: string
      nombre:
        type: string
      sesiones:
        type: integer
      tiempo:
        type: string
    type: object
  models.ServicioItem:
    properties:
      categoria:
        type: string
      costo:
        type: string
      id:
        type: integer
      local:
        type: string
      nombre:
        type: string
      requiere_evaluacion:
        type: boolean
      sesiones:
        type: integer
      tiempo:
        type: string
      tipoEspacio:
        type: string
    type: object
  models.TipoEspacioLocal:
    properties:
      cantidad_espacios:
        type: integer
      tipo_espacio:
        type: string
    type: object
  services.ReservaSimple:
    properties:
      cliente:
        type: string
      estado:
        type: string
      fecha:
        type: string
      hora_desde:
        type: string
      hora_hasta:
        type: string
      id:
        type: integer
      local:
        type: string
      notas:
        type: string
      numero_telefono:
        type: string
      precio:
        type: number
      servicio:
        type: string
      servicio_confirmado:
        type: string
      servicio_solicitado:
        type: string
      tipo:
        type: string
    type: object
  utils.APIResponse:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      error:
        example: false
        type: boolean
      message:
        example: operacion realizada correctamente
        type: string
      status:
        example: OK
        type: string
    type: object
info:
  contact: {}
  description: API REST para reservas, servicios, combos y administracion de Atrevida
    Fit.
  title: Atrevida Fit - Agenda API
  version: v0.1
paths:
  /:
    get:
      description: Devuelve un mensaje simple para confirmar que la API esta activa.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Estado de la API
      tags:
      - Base
  /admin/importar:
    post:
      description: Ejecuta la importacion de categorias, servicios y combos desde
        Google Sheets hacia PostgreSQL.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.importResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Importar catalogo desde Google Sheets
      tags:
      - Admin
  /bd/categorias:
    get:
      description: Devuelve todas las categorias registradas en la base de datos.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.categoriaListResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar categorias
      tags:
      - Categorias
    post:
      consumes:
      - application/json
      description: Crea una nueva categoria en la base de datos.
      parameters:
      - description: Datos de la categoria
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.crearCategoriaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.idResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Crear categoria
      tags:
      - Categorias
  /bd/clientes:
    get:
      description: Devuelve clientes de PostgreSQL con filtros opcionales por nombre,
        apellido y numero de telefono.
      parameters:
      - description: Busqueda parcial por nombre
        example: Maria
        in: query
        name: nombre
        type: string
      - description: Busqueda parcial por apellido
        example: Lopez
        in: query
        name: apellido
        type: string
      - description: Busqueda parcial por numero de telefono
        example: "+59170011223"
        in: query
        name: numero_telefono
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.clienteListResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar clientes
      tags:
      - Clientes
    post:
      consumes:
      - application/json
      description: Crea un nuevo cliente en la base de datos.
      parameters:
      - description: Datos del cliente
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.crearClienteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.idResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Crear cliente
      tags:
      - Clientes
  /bd/clientes/{id}:
    delete:
      description: Elimina un cliente de la base de datos.
      parameters:
      - description: ID del cliente
        example: 12
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.messageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Eliminar cliente
      tags:
      - Clientes
    get:
      description: Devuelve un cliente de PostgreSQL por su identificador.
      parameters:
      - description: ID del cliente
        example: 12
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.clienteItemResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Obtener cliente por ID
      tags:
      - Clientes
    patch:
