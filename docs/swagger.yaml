info:
  contact: {}
  description: API REST para reservas, servicios, combos y administracion de Atrevida
    Fit.
  title: Atrevida Fit - Agenda API
  version: v0.1
paths:
  /:
    get:
      description: Devuelve un mensaje simple para confirmar que la API esta activa.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Estado de la API
      tags:
      - Base
  /admin/importar:
    post:
      description: Endpoint legacy deshabilitado. Google Sheets ya no esta soportado;
        el codigo anterior queda comentado para una posible recuperacion futura.
      produces:
      - application/json
      responses:
        "410":
          description: Google Sheets ya no soportado
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Endpoint legacy para importar catalogo desde Google Sheets
      tags:
      - Admin
  /auth/change-password:
    patch:
      consumes:
      - application/json
      description: 'Cambia la password del usuario autenticado. Requiere token Bearer
        y toma el usuario exclusivamente del token. Body: password requerida.'
      parameters:
      - default: Bearer <token>
        description: Token Bearer
        in: header
        name: Authorization
        required: true
        type: string
      - description: Nueva password
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.cambiarPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.messageResponse'
              type: object
        "400":
          description: 'Error de validacion: body invalido, password obligatoria'
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Token requerido, invalido o expirado
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Usuario no encontrado
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Cambiar password propia
      tags:
      - Auth
  /auth/deactivate:
    patch:
      consumes:
      - application/json
      description: 'Actualiza el estado activo de otro usuario. Requiere token Bearer
        con rol admin_sys. No permite modificar el estado del usuario autenticado
        ni desactivar al unico usuario admin_sys activo. Body: username y activo requeridos;
        activo=false desactiva, activo=true reactiva.'
      parameters:
      - default: Bearer <token>
        description: Token Bearer
        in: header
        name: Authorization
        required: true
        type: string
      - description: Usuario y estado activo
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.actualizarUsuarioActivoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
