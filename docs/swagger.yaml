basePath: /
definitions:
  handlers.activarServicioRequest:
    properties:
      local:
        description: Nombre del local donde activar el servicio
        example: PASEO ARANJUEZ
        type: string
    required:
    - local
    type: object
  handlers.actualizadasResponse:
    properties:
      actualizadas:
        description: Cantidad de registros actualizados
        example: 3
        type: integer
    type: object
  handlers.actualizarClienteRequest:
    properties:
      apellido:
        description: Nuevo apellido (opcional)
        example: Lopez Aguilar
        type: string
      nombre:
        description: Nuevo nombre (opcional)
        example: Maria Fernanda
        type: string
      numero_telefono:
        description: Nuevo numero de telefono (opcional)
        example: "+59170011224"
        type: string
    type: object
  handlers.actualizarComboServicioRequest:
    properties:
      costo:
        description: Costo del servicio (opcional)
        example: 250
        type: number
      orden:
        description: Orden de aparición (opcional)
        example: 1
        type: integer
      servicio_id:
        description: ID del servicio en BD (opcional)
        example: 8
        type: integer
      servicio_texto:
        description: Nombre del servicio personalizado (opcional)
        example: Masaje relajante personalizado
        type: string
      sesiones:
        description: Cantidad de sesiones (opcional)
        example: 2
        type: integer
      tiempo:
        description: Duración del servicio HH:MM (opcional)
        example: "01:00"
        type: string
    type: object
  handlers.actualizarDetallePagoRequest:
    properties:
      cantidad:
        description: Cantidad para un detalle nuevo.
        example: 2
        type: integer
      id:
        description: ID del detalle existente que debe conservarse.
        example: 25
        type: integer
      precio_unitario:
        description: Precio unitario para un detalle nuevo.
        example: 250
        type: number
      servicio:
        description: Texto del servicio para un detalle nuevo.
        example: Limpieza facial
        type: string
      servicio_id:
        description: ID opcional del servicio para un detalle nuevo.
        example: 8
        type: integer
      subtotal:
        description: Subtotal para un detalle nuevo.
        example: 500
        type: number
    type: object
  handlers.actualizarEstadoReservaPGRequest:
    properties:
      causa:
        description: Motivo del cambio de estado
        example: Cliente confirmo por WhatsApp
        type: string
      estado:
        description: 'Nuevo estado: PENDIENTE, AGENDADO, RECHAZADO o COMPLETADO'
        example: AGENDADO
        type: string
      id:
        description: ID de la reserva
        example: 44
        type: integer
      precio:
        description: Precio actualizado (opcional)
        example: 350
        type: number
      servicio_confirmado:
        description: Servicio confirmado (opcional, se actualiza si se envia)
        example: Depilacion Laser Piernas
        type: string
      tipo:
        description: 'Tipo de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - estado
    - id
    type: object
  handlers.actualizarLocalHorarioRequest:
    properties:
      dia_semana:
        description: Día de la semana 1-7 (opcional)
        example: 6
        type: integer
      hora_desde:
        description: Hora de inicio HH:MM (opcional)
        example: "10:00"
        type: string
      hora_hasta:
        description: Hora de fin HH:MM (opcional)
        example: "16:00"
        type: string
    type: object
  handlers.actualizarLocalRequest:
    properties:
      activo:
        description: Estado activo/inactivo (opcional)
        example: true
        type: boolean
      nombre:
        description: Nuevo nombre del local (opcional)
        example: PASEO ARANJUEZ
        type: string
    type: object
  handlers.actualizarNotificadoReservaPGRequest:
    properties:
      id:
        description: ID de la reserva
        example: 44
        type: integer
      notificado:
        description: 'Estado de notificacion: true = notificado, false = no notificado'
        example: true
        type: boolean
    required:
    - id
    - notificado
    type: object
  handlers.actualizarPagoRequest:
    properties:
      activo:
        description: Nuevo estado activo (opcional).
        example: true
        type: boolean
      cliente_id:
        description: Nuevo ID del cliente; puede enviarse null para limpiar la referencia.
        example: 12
        type: integer
      cliente_nit:
        description: Nuevo NIT del cliente (opcional).
        example: "1234567"
        type: string
      cliente_nombre:
        description: Nuevo nombre del cliente (opcional).
        example: Maria Lopez
        type: string
      descuento:
        description: Nuevo descuento del pago (opcional).
        example: 50
        type: number
      detalle:
        description: Detalle completo deseado para sincronizar; ids presentes se conservan,
          ids ausentes se eliminan y items sin id se crean.
        items:
          $ref: '#/definitions/handlers.actualizarDetallePagoRequest'
        type: array
      estado:
        description: Nuevo estado del pago (opcional).
        example: PAGADO
        type: string
      local_id:
        description: Nuevo ID del local (opcional).
        example: 1
        type: integer
      local_nombre:
        description: Nuevo nombre del local (opcional).
        example: SAN MARTIN
        type: string
      subtotal:
        description: Nuevo subtotal del pago (opcional).
        example: 500
        type: number
      total_final:
        description: Nuevo total final del pago (opcional).
        example: 450
        type: number
    type: object
  handlers.actualizarReservaPGRequest:
    properties:
      id:
        description: ID de la reserva a actualizar
        example: 44
        type: integer
      local:
        description: Nombre del local (siempre requerido para validar existencia)
        example: SAN MARTIN
        type: string
      nueva_fecha:
        description: Nueva fecha (YYYY-MM-DD), opcional
        example: "2026-05-24"
        type: string
      nueva_hora_desde:
        description: Nueva hora de inicio (HH:MM), opcional
        example: "16:00"
        type: string
      nueva_hora_hasta:
        description: Nueva hora de fin (HH:MM), opcional
        example: "17:00"
        type: string
      nuevas_notas:
        description: Nuevas notas u observaciones, opcional
        example: Reagendada por solicitud del cliente
        type: string
      nuevo_numero_telefono:
        description: Nuevo numero de telefono, opcional
        example: "+59170011224"
        type: string
      nuevo_precio:
        description: Nuevo precio, opcional
        example: 180
        type: number
      nuevo_servicio:
        description: Nuevo nombre del servicio principal (opcional)
        example: Evaluacion corporal
        type: string
      nuevo_servicio_confirmado:
        description: Nuevo servicio confirmado tras evaluacion (opcional)
        example: Evaluacion corporal
        type: string
      nuevo_servicio_solicitado:
        description: Nuevo detalle de lo que solicito el cliente (opcional)
        example: Evaluacion corporal completa
        type: string
      nuevo_tipo:
        description: 'Nuevo tipo de espacio: M (mesa) o B (bicicleta), opcional'
        example: B
        type: string
    required:
    - id
    - local
    type: object
  handlers.actualizarReservaRequest:
    properties:
      cliente:
        description: Nombre del cliente
        example: Maria Lopez
        type: string
      dia:
        description: Dia actual de la reserva
        example: lunes
        type: string
      hora:
        description: Hora actual de la reserva
        example: "09:00"
        type: string
      local:
        description: Nombre del local
        example: SAN MARTIN
        type: string
      nueva_hora_desde:
        description: Nueva hora de inicio (opcional)
        example: "11:00"
        type: string
      nueva_hora_hasta:
        description: Nueva hora de fin (opcional)
        example: "12:00"
        type: string
      nuevo_dia:
        description: Nuevo dia (opcional)
        example: martes
        type: string
      nuevo_servicio:
        description: Nuevo nombre del servicio (opcional)
        example: Evaluacion corporal
        type: string
      nuevo_tipo:
        description: 'Nuevo tipo de espacio: M o B (opcional)'
        example: B
        type: string
      semana:
        description: Semana en formato YYYY-MM-DD
        example: "2026-05-25"
        type: string
      tipo:
        description: 'Tipo actual de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - cliente
    - dia
    - hora
    - local
    - semana
    - tipo
    type: object
  handlers.actualizarServicioRequest:
    properties:
      activo:
        description: Nuevo estado activo/inactivo (opcional)
        example: true
        type: boolean
      categoria:
        description: Nueva categoría (opcional)
        example: Corporal
        type: string
      costo:
        description: Nuevo costo (opcional)
        example: 420
        type: number
      nombre:
        description: Nuevo nombre (opcional)
        example: Depilacion Laser Piernas Premium
        type: string
      requiere_evaluacion:
        description: Nuevo estado de requiere evaluación (opcional)
        example: false
        type: boolean
      sesiones:
        description: Nueva cantidad de sesiones (opcional)
        example: 8
        type: integer
      tiempo:
        description: Nueva duración HH:MM (opcional)
        example: "01:15"
        type: string
      tipo_espacio_requerido:
        description: Nuevo tipo de espacio requerido M/B (opcional)
        example: M
        type: string
    type: object
  handlers.actualizarUsuarioActivoRequest:
    properties:
      activo:
        description: Estado activo del usuario a modificar.
        example: true
        type: boolean
      username:
        description: Nombre de usuario a activar o desactivar.
        example: operador
        type: string
    required:
    - activo
    - username
    type: object
  handlers.authRequest:
    properties:
      password:
        description: Password en texto plano enviada por el cliente.
        example: Secreto123
        type: string
      username:
        description: Nombre de usuario para iniciar sesion.
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  handlers.cambiarPasswordRequest:
    properties:
      password:
        description: Nueva password del usuario autenticado.
        example: NuevoSecreto123
        type: string
    required:
    - password
    type: object
  handlers.categoriaListResponse:
    properties:
      categorias:
        description: Lista de categorías
        items:
          $ref: '#/definitions/models.CategoriaPG'
        type: array
      total:
        description: Total de categorías encontradas
        example: 5
        type: integer
    type: object
  handlers.categoriaLocalRequest:
    properties:
      categoria_id:
        description: ID de la categoria a asociar con el local
        example: 3
        type: integer
      local_id:
        description: ID del local a asociar con la categoria
        example: 1
        type: integer
    required:
    - categoria_id
    - local_id
    type: object
  handlers.clienteFiltrosResponse:
    properties:
      apellido:
        description: 'Filtro aplicado: apellido del cliente'
        example: Lopez
        type: string
      nombre:
        description: 'Filtro aplicado: nombre del cliente'
        example: Maria
        type: string
      numero_telefono:
        description: 'Filtro aplicado: número de teléfono del cliente'
        example: "+59170011223"
        type: string
    type: object
  handlers.clienteItemResponse:
    properties:
      cliente:
        allOf:
        - $ref: '#/definitions/models.ClientePG'
        description: Datos del cliente
    type: object
  handlers.clienteListResponse:
    properties:
      clientes:
        description: Lista de clientes
        items:
          $ref: '#/definitions/models.ClientePG'
        type: array
      filtros:
        allOf:
        - $ref: '#/definitions/handlers.clienteFiltrosResponse'
        description: Filtros aplicados en la búsqueda
      total:
        description: Total de clientes encontrados
        example: 1
        type: integer
    type: object
  handlers.comboFiltrosResponse:
    properties:
      categoria:
        description: 'Filtro aplicado: categoría del combo'
        example: Corporal
        type: string
      local:
        description: 'Filtro aplicado: nombre del local'
        example: ARANJUEZ
        type: string
      nombre:
        description: 'Filtro aplicado: nombre del combo'
        example: relax
        type: string
      sesiones:
        description: 'Filtro aplicado: cantidad de sesiones'
        example: 4
        type: integer
    type: object
  handlers.comboListResponse:
    properties:
      combos:
        description: Lista de combos
        items:
          $ref: '#/definitions/models.ComboItem'
        type: array
      filtros:
        allOf:
        - $ref: '#/definitions/handlers.comboFiltrosResponse'
        description: Filtros aplicados en la búsqueda
      total:
        description: Total de combos encontrados
        example: 3
        type: integer
    type: object
  handlers.comboServicioItemResponse:
    properties:
      servicio:
        allOf:
        - $ref: '#/definitions/models.ComboServicioDetallePG'
        description: Datos del servicio de combo
    type: object
  handlers.comboServicioListResponse:
    properties:
      combo_id:
        description: ID del combo padre
        example: 12
        type: integer
      servicios:
        description: Lista de servicios del combo
        items:
          $ref: '#/definitions/models.ComboServicioDetallePG'
        type: array
      total:
        description: Total de servicios del combo
        example: 3
        type: integer
    type: object
  handlers.crearCategoriaRequest:
    properties:
      local_id:
        description: ID del local al que se asociara la categoria; si es null u omitido,
          solo crea la categoria
        example: 1
        type: integer
      nombre:
        description: Nombre de la categoria
        example: Depilacion Laser
        type: string
    required:
    - nombre
    type: object
  handlers.crearClienteRequest:
    properties:
      apellido:
        description: Apellido del cliente
        example: Lopez
        type: string
      nombre:
        description: Nombre del cliente
        example: Maria
        type: string
      numero_telefono:
        description: Numero de telefono del cliente
        example: "+59170011223"
        type: string
    type: object
  handlers.crearComboServicioRequest:
    properties:
      combo_id:
        description: ID del combo padre
        example: 12
        type: integer
      costo:
        description: Costo del servicio
        example: 250
        type: number
      orden:
        description: Orden de aparición dentro del combo
        example: 1
        type: integer
      servicio_id:
        description: ID del servicio en BD (opcional si se envía servicio_texto)
        example: 8
        type: integer
      servicio_texto:
        description: Nombre del servicio personalizado (opcional si se envía servicio_id)
        example: Masaje relajante personalizado
        type: string
      sesiones:
        description: Cantidad de sesiones
        example: 2
        type: integer
      tiempo:
        description: Duración del servicio (HH:MM)
        example: "01:00"
        type: string
    required:
    - combo_id
    type: object
  handlers.crearDetallePagoRequest:
    properties:
      cantidad:
        description: Cantidad cobrada.
        example: 2
        type: integer
      precio_unitario:
        description: Precio unitario del servicio.
        example: 250
        type: number
      servicio:
        description: Texto del servicio cobrado.
        example: Limpieza facial
        type: string
      servicio_id:
        description: ID opcional del servicio cobrado; puede enviarse null.
        example: 8
        type: integer
      subtotal:
        description: Subtotal de la linea.
        example: 500
        type: number
    type: object
  handlers.crearLocalHorarioRequest:
    properties:
      dia_semana:
        description: Día de la semana (1=lunes, 7=domingo)
        example: 1
        type: integer
      hora_desde:
        description: Hora de inicio (HH:MM)
        example: "09:00"
        type: string
      hora_hasta:
        description: Hora de fin (HH:MM)
        example: "18:00"
        type: string
      local_id:
        description: ID del local
        example: 3
        type: integer
    type: object
  handlers.crearLocalRequest:
    properties:
      espacios:
        description: Espacios del local (opcional)
        items:
          $ref: '#/definitions/handlers.espacioRequest'
        type: array
      nombre:
        description: Nombre del local
        example: SAN MARTIN
        type: string
    required:
    - nombre
    type: object
  handlers.crearPagoRequest:
    properties:
      activo:
        description: Estado activo inicial del pago.
        example: true
        type: boolean
      cliente_id:
        description: ID opcional del cliente registrado; puede enviarse null.
        example: 12
        type: integer
      cliente_nit:
        description: NIT del cliente.
        example: "1234567"
        type: string
      cliente_nombre:
        description: Nombre del cliente.
        example: Maria Lopez
        type: string
      descuento:
        description: Descuento aplicado.
        example: 50
        type: number
      detalle:
        description: Detalle de servicios cobrados.
        items:
          $ref: '#/definitions/handlers.crearDetallePagoRequest'
        type: array
      estado:
        description: Estado inicial del pago.
        example: PENDIENTE
        type: string
      local_id:
        description: ID del local donde se registra el pago.
        example: 1
        type: integer
      local_nombre:
        description: Nombre del local donde se registra el pago.
        example: SAN MARTIN
        type: string
      subtotal:
        description: Subtotal del pago.
        example: 500
        type: number
      total_final:
        description: Total final del pago.
        example: 450
        type: number
    type: object
  handlers.crearReservaPGRequest:
    properties:
      cliente:
        description: Nombre del cliente
        example: Maria Lopez
        type: string
      estado:
        description: 'Estado inicial: PENDIENTE (default), AGENDADO (solo si el servicio
          no requiere evaluacion)'
        example: PENDIENTE
        type: string
      fecha:
        description: Fecha de la reserva (YYYY-MM-DD)
        example: "2026-05-23"
        type: string
      hora_desde:
        description: Hora de inicio (HH:MM)
        example: "15:00"
        type: string
      hora_hasta:
        description: Hora de fin (HH:MM)
        example: "16:00"
        type: string
      local:
        description: Nombre del local
        example: SAN MARTIN
        type: string
      notas:
        description: Notas u observaciones
        example: Primera sesion del plan
        type: string
      numero_telefono:
        description: Numero de telefono del cliente
        example: "+59170011223"
        type: string
      plan_id:
        description: ID del plan asociado (opcional)
        example: 21
        type: integer
      precio:
        description: Precio de la reserva
        example: 350
        type: number
      servicio:
        description: 'Nombre del servicio principal (ej: "Depilacion laser"). Se usa
          como identificador general.'
        example: Depilacion laser
        type: string
      servicio_confirmado:
        description: 'Servicio final confirmado tras evaluacion (ej: "Depilacion Laser
          Piernas"). Si se omite y el servicio no requiere evaluacion, se autocompleta
          con el nombre del servicio encontrado en BD.'
        example: Depilacion Laser Piernas
        type: string
      servicio_id:
        description: ID del servicio seleccionado en BD. Si se envia, se usa para
          validar si requiere evaluacion.
        example: 8
        type: integer
      servicio_solicitado:
        description: 'Detalle de lo que solicito el cliente (ej: "Piernas completas").
          Si se omite, se copia de "servicio".'
        example: Piernas completas
        type: string
      tipo:
        description: 'Tipo de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - cliente
    - fecha
    - hora_desde
    - local
    - numero_telefono
    type: object
  handlers.crearReservaRequest:
    properties:
      cliente:
        description: Nombre del cliente
        example: Maria Lopez
        type: string
      dia:
        description: Dia de la semana (lunes, martes, miercoles, jueves, viernes,
          sabado)
        example: lunes
        type: string
      hora_desde:
        description: Hora de inicio (HH:MM)
        example: "09:00"
        type: string
      hora_hasta:
        description: Hora de fin (HH:MM), opcional
        example: "10:00"
        type: string
      local:
        description: Nombre del local
        example: SAN MARTIN
        type: string
      semana:
        description: Semana en formato YYYY-MM-DD (primer dia de la semana, lunes)
        example: "2026-05-25"
        type: string
      servicio:
        description: 'Nombre del servicio (ej: "Depilacion piernas completas"). Texto
          libre.'
        example: Depilacion piernas completas
        type: string
      tipo:
        description: 'Tipo de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - cliente
    - dia
    - hora_desde
    - local
    - semana
    - tipo
    type: object
  handlers.crearServicioRequest:
    properties:
      categoria:
        description: Nombre de la categoría
        example: Corporal
        type: string
      costo:
        description: Costo del servicio
        example: 350
        type: number
      local:
        description: Nombre del local donde activar el servicio (opcional)
        example: SAN MARTIN
        type: string
      nombre:
        description: Nombre del servicio
        example: Depilacion Laser Piernas
        type: string
      requiere_evaluacion:
        description: Indica si requiere evaluación previa (default true)
        example: true
        type: boolean
      sesiones:
        description: Cantidad de sesiones (default 1)
        example: 6
        type: integer
      tiempo:
        description: Duración del servicio (HH:MM)
        example: "01:00"
        type: string
      tipo_espacio_requerido:
        description: 'Tipo de espacio requerido: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - categoria
    - nombre
    type: object
  handlers.espacioRequest:
    properties:
      cantidad_espacios:
        description: Cantidad de espacios de este tipo
        example: 6
        minimum: 1
        type: integer
      tipo_espacio:
        description: 'Tipo de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - cantidad_espacios
    - tipo_espacio
    type: object
  handlers.horarioFiltrosResponse:
    properties:
      dia_semana:
        description: 'Filtro aplicado: día de la semana (1=lunes, 7=domingo)'
        example: 1
        type: integer
      local_id:
        description: 'Filtro aplicado: ID del local'
        example: 3
        type: integer
    type: object
  handlers.horarioItemResponse:
    properties:
      horario:
        allOf:
        - $ref: '#/definitions/models.LocalHorarioPG'
        description: Datos del horario
    type: object
  handlers.horarioListResponse:
    properties:
      filtros:
        allOf:
        - $ref: '#/definitions/handlers.horarioFiltrosResponse'
        description: Filtros aplicados en la búsqueda
      horarios:
        description: Lista de horarios del local
        items:
          $ref: '#/definitions/models.LocalHorarioPG'
        type: array
      total:
        description: Total de horarios encontrados
        example: 5
        type: integer
    type: object
  handlers.idResponse:
    properties:
      id:
        description: ID del recurso creado
        example: 42
        type: integer
    type: object
  handlers.localItemResponse:
    properties:
      local:
        allOf:
        - $ref: '#/definitions/models.LocalConEspacios'
        description: Datos del local con espacios y horarios
      total:
