  /bd/pagos:
    get:
      description: 'Devuelve pagos activos de BD con filtros opcionales. Requiere
        token Bearer. Solo retorna la informacion base del pago, sin detalle. Filtros:
        codigo_pago busqueda parcial, local_id, local_nombre busqueda parcial, cliente_id,
        cliente_nit busqueda parcial, cliente_nombre busqueda parcial, estado PAGADO/BORRADOR/PENDIENTE
        y activo true/false. Si activo no se envia, lista solo pagos activos.'
      parameters:
      - default: Bearer <token>
        description: Token Bearer
        in: header
        name: Authorization
        required: true
        type: string
      - description: Busqueda parcial por codigo de pago
        example: PAGO-000001
        in: query
        name: codigo_pago
        type: string
      - description: ID del local
        example: 1
        in: query
        name: local_id
        type: integer
      - description: Busqueda parcial por nombre del local
        example: SAN MARTIN
        in: query
        name: local_nombre
        type: string
      - description: ID del cliente
        example: 12
        in: query
        name: cliente_id
        type: integer
      - description: Busqueda parcial por NIT del cliente
        example: "1234567"
        in: query
        name: cliente_nit
        type: string
      - description: Busqueda parcial por nombre del cliente
        example: Maria
        in: query
        name: cliente_nombre
        type: string
      - description: Estado del pago
        enum:
        - PAGADO
        - BORRADOR
        - PENDIENTE
        example: PENDIENTE
        in: query
        name: estado
        type: string
      - description: Filtrar por activo; default true
        example: true
        in: query
        name: activo
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.pagoListResponse'
              type: object
        "400":
          description: 'Error de validacion: local_id invalido, cliente_id invalido,
            activo invalido, estado invalido'
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Token requerido, invalido o expirado
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar pagos
      tags:
      - Pagos
    post:
      consumes:
      - application/json
      description: 'Crea un pago independiente junto con su detalle en una sola transaccion.
        Requiere token Bearer. Todos los campos de cabecera deben venir en el body
        excepto codigo_pago, fecha_creacion y fecha_modificacion, que se generan en
        BD. subtotal y total_final son opcionales: si no se envian, se calculan desde
        la suma de subtotales del detalle y el descuento. cliente_id puede venir como
        null. Cada item de detalle debe incluir servicio_id (puede ser null), servicio,
        precio_unitario, cantidad y subtotal. Response: codigo_pago generado incrementalmente.'
      parameters:
      - default: Bearer <token>
        description: Token Bearer
        in: header
        name: Authorization
        required: true
        type: string
      - description: Datos completos del pago y su detalle
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.crearPagoRequest'
      produces:
