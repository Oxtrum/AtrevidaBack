basePath: /
definitions:
  handlers.activarServicioRequest:
    properties:
      local:
        type: string
    required:
    - local
    type: object
  handlers.actualizarClienteRequest:
    properties:
      apellido:
        type: string
      nombre:
        type: string
      numero_telefono:
        type: string
    type: object
  handlers.actualizarEstadoReservaPGRequest:
    properties:
      causa:
        type: string
      estado:
        type: string
      id:
        type: integer
      precio:
        type: number
      servicio_confirmado:
        type: string
      tipo:
        type: string
    required:
    - estado
    - id
    type: object
  handlers.actualizarLocalRequest:
    properties:
      activo:
        type: boolean
      nombre:
        type: string
    type: object
  handlers.actualizarReservaPGRequest:
    properties:
      id:
        type: integer
      local:
        type: string
      nueva_fecha:
        type: string
      nueva_hora_desde:
        type: string
      nueva_hora_hasta:
        type: string
      nuevas_notas:
        type: string
      nuevo_numero_telefono:
        type: string
      nuevo_precio:
        type: number
      nuevo_servicio:
        type: string
      nuevo_servicio_confirmado:
        type: string
      nuevo_servicio_solicitado:
        type: string
      nuevo_tipo:
        type: string
    required:
    - id
    - local
    type: object
  handlers.actualizarReservaRequest:
    properties:
      cliente:
        type: string
      dia:
        type: string
      hora:
        type: string
      local:
        type: string
      nueva_hora_desde:
        type: string
      nueva_hora_hasta:
        type: string
      nuevo_dia:
        type: string
      nuevo_servicio:
        type: string
      nuevo_tipo:
        type: string
      semana:
        type: string
      tipo:
        type: string
    required:
    - cliente
    - dia
    - hora
    - local
    - semana
    - tipo
    type: object
  handlers.actualizarServicioRequest:
    properties:
      activo:
        type: boolean
      categoria:
        type: string
      costo:
        type: number
      nombre:
        type: string
      requiere_evaluacion:
        type: boolean
      sesiones:
        type: integer
      tiempo:
        type: string
      tipo_espacio_requerido:
        type: string
    type: object
  handlers.crearCategoriaRequest:
    properties:
      nombre:
        type: string
    required:
    - nombre
    type: object
  handlers.crearClienteRequest:
    properties:
      apellido:
        type: string
      nombre:
        type: string
      numero_telefono:
        type: string
    type: object
  handlers.crearLocalRequest:
    properties:
      espacios:
        description: opcional
        items:
          $ref: '#/definitions/handlers.espacioRequest'
        type: array
      nombre:
        type: string
    required:
    - nombre
    type: object
  handlers.crearReservaPGRequest:
    properties:
      cliente:
        type: string
      estado:
        type: string
      fecha:
        type: string
      hora_desde:
        type: string
      hora_hasta:
        type: string
      local:
        type: string
      notas:
        type: string
      numero_telefono:
        type: string
      plan_id:
        type: integer
      precio:
        type: number
      servicio:
        type: string
      servicio_confirmado:
        type: string
      servicio_solicitado:
        type: string
      tipo:
        type: string
    required:
    - cliente
    - fecha
    - hora_desde
    - local
    - numero_telefono
    type: object
  handlers.crearReservaRequest:
    properties:
      cliente:
        type: string
      dia:
        type: string
      hora_desde:
        type: string
      hora_hasta:
        type: string
      local:
        type: string
      semana:
        type: string
      servicio:
        type: string
      tipo:
        type: string
    required:
    - cliente
    - dia
    - hora_desde
    - local
    - semana
    - tipo
    type: object
  handlers.crearServicioRequest:
    properties:
      categoria:
        type: string
      costo:
        type: number
      local:
        description: opcional
        type: string
      nombre:
        type: string
      requiere_evaluacion:
        type: boolean
      sesiones:
        type: integer
      tiempo:
        type: string
      tipo_espacio_requerido:
        description: '"M" | "B" | nil'
        type: string
    required:
    - categoria
    - nombre
    type: object
  handlers.espacioRequest:
    properties:
      cantidad_espacios:
        minimum: 1
        type: integer
      tipo_espacio:
        type: string
    required:
    - cantidad_espacios
    - tipo_espacio
    type: object
  handlers.reservaResumenResponse:
    properties:
      reservas_agendadas_dia:
        type: integer
      semana:
        $ref: '#/definitions/handlers.reservaResumenSemanaResponse'
      servicios_completados_dia:
        type: integer
    type: object
  handlers.reservaResumenSemanaResponse:
    properties:
      jueves:
        type: integer
      lunes:
        type: integer
      martes:
        type: integer
      miercoles:
        type: integer
      sabado:
        type: integer
      total_reservas:
        type: integer
      viernes:
        type: integer
    type: object
  utils.APIResponse:
    properties:
      code:
        type: integer
      data: {}
      error:
        type: boolean
      message:
        type: string
      status:
        type: string
    type: object
info:
  contact: {}
  description: API REST para reservas, servicios, combos y administracion de Atrevida
    Fit.
  title: Atrevida Fit - Agenda API
  version: v0.1
paths:
  /:
    get:
      description: Devuelve un mensaje simple para confirmar que la API esta activa.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Estado de la API
      tags:
      - Base
  /admin/importar:
    post:
      description: Ejecuta la importacion de categorias, servicios y combos desde
        Google Sheets hacia PostgreSQL.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Importar catalogo desde Google Sheets
      tags:
      - Admin
  /bd/categorias:
    get:
      description: Devuelve todas las categorias registradas en la base de datos.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar categorias
      tags:
      - Categorias
    post:
      consumes:
      - application/json
      description: Crea una nueva categoria en la base de datos.
      parameters:
      - description: Datos de la categoria
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.crearCategoriaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Crear categoria
      tags:
      - Categorias
  /bd/clientes:
    get:
      description: Devuelve clientes de PostgreSQL con filtros opcionales por nombre,
        apellido y numero de telefono.
      parameters:
      - description: Busqueda parcial por nombre
        in: query
        name: nombre
        type: string
      - description: Busqueda parcial por apellido
        in: query
        name: apellido
        type: string
      - description: Busqueda parcial por numero de telefono
        in: query
        name: numero_telefono
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar clientes
      tags:
      - Clientes
    post:
      consumes:
      - application/json
      description: Crea un nuevo cliente en la base de datos.
      parameters:
      - description: Datos del cliente
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.crearClienteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Crear cliente
      tags:
      - Clientes
  /bd/clientes/{id}:
    delete:
      description: Elimina un cliente de la base de datos.
      parameters:
      - description: ID del cliente
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Eliminar cliente
      tags:
      - Clientes
    get:
      description: Devuelve un cliente de PostgreSQL por su identificador.
      parameters:
      - description: ID del cliente
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Obtener cliente por ID
      tags:
      - Clientes
    patch:
      consumes:
      - application/json
      description: Actualiza parcialmente un cliente existente en PostgreSQL.
      parameters:
      - description: ID del cliente
        in: path
        name: id
        required: true
        type: integer
      - description: Campos a actualizar
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.actualizarClienteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Actualizar cliente
      tags:
      - Clientes
  /bd/combos:
    get:
      description: Devuelve combos persistidos en PostgreSQL con filtros opcionales.
      parameters:
      - description: Busqueda parcial por nombre
        in: query
        name: nombre
        type: string
      - description: Busqueda parcial por categoria
        in: query
        name: categoria
        type: string
      - description: Local
        enum:
        - SAN MARTIN
        - PASEO ARANJUEZ
        in: query
        name: local
        type: string
      - description: Numero exacto de sesiones
        in: query
        name: sesiones
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar combos desde base de datos
      tags:
      - Combos BD
  /bd/locales:
    get:
      description: Devuelve todos los locales registrados en la base de datos.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar locales
      tags:
      - Locales
    post:
      consumes:
      - application/json
      description: Crea un local y opcionalmente sus espacios asociados.
      parameters:
      - description: Datos del local
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.crearLocalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Crear local
      tags:
      - Locales
  /bd/locales/{id}:
    delete:
      description: Realiza el borrado logico de un local estableciendo activo en false.
      parameters:
      - description: ID del local
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Eliminar local
      tags:
      - Locales
    get:
      description: Devuelve un local de PostgreSQL por su identificador.
      parameters:
      - description: ID del local
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Obtener local por ID
      tags:
      - Locales
    patch:
      consumes:
      - application/json
      description: Actualiza nombre o estado activo de un local existente.
      parameters:
      - description: ID del local
        in: path
        name: id
        required: true
        type: integer
      - description: Campos a actualizar
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.actualizarLocalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Actualizar local
      tags:
      - Locales
  /bd/reservas:
    get:
      description: Devuelve reservas desde PostgreSQL en formato simple y sin agrupacion
        por local.
      parameters:
      - description: Nombre del local
        in: query
        name: local
        type: string
      - description: Fecha exacta
        in: query
        name: fecha
        type: string
      - description: Fecha desde
        in: query
        name: fecha_desde
        type: string
      - description: Fecha hasta
        in: query
        name: fecha_hasta
        type: string
      - description: Nombre del cliente
        in: query
        name: cliente
        type: string
      - description: Numero de telefono
        in: query
        name: numero_telefono
        type: string
      - description: Busqueda parcial por servicio solicitado
        in: query
        name: servicio_solicitado
        type: string
      - description: Busqueda parcial por servicio confirmado
        in: query
        name: servicio_confirmado
        type: string
      - description: Estado de la reserva
        enum:
        - PENDIENTE
        - RECHAZADO
        - AGENDADO
        - COMPLETADO
        in: query
        name: estado
        type: string
      - description: Tipo de reserva
        enum:
        - mesa
        - bicicleta
        in: query
        name: tipo
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar reservas simples
      tags:
      - Reservas BD
    patch:
      consumes:
      - application/json
      description: Actualiza una reserva existente en PostgreSQL.
      parameters:
      - description: Datos para actualizar la reserva
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.actualizarReservaPGRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Actualizar reserva en base de datos
      tags:
      - Reservas BD
    post:
      consumes:
      - application/json
      description: Crea una reserva persistida en PostgreSQL.
      parameters:
      - description: Datos de la reserva
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.crearReservaPGRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Crear reserva en base de datos
      tags:
      - Reservas BD
  /bd/reservas/{id}:
    delete:
      description: Realiza el borrado logico de una reserva estableciendo activo en
        false.
      parameters:
      - description: ID de la reserva
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Eliminar reserva
      tags:
      - Reservas BD
    get:
      description: Devuelve una reserva de PostgreSQL por su identificador.
      parameters:
      - description: ID de la reserva
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Obtener reserva por ID
      tags:
      - Reservas BD
  /bd/reservas/calendario:
    get:
      description: Devuelve reservas agrupadas por local con filtros opcionales.
      parameters:
      - description: Nombre del local
        in: query
        name: local
        type: string
      - description: Fecha exacta
        in: query
        name: fecha
        type: string
      - description: Fecha desde
        in: query
        name: fecha_desde
        type: string
      - description: Fecha hasta
        in: query
        name: fecha_hasta
        type: string
      - description: Nombre del cliente
        in: query
        name: cliente
        type: string
      - description: Numero de telefono
        in: query
        name: numero_telefono
        type: string
      - description: Busqueda parcial por servicio solicitado
        in: query
        name: servicio_solicitado
        type: string
      - description: Busqueda parcial por servicio confirmado
        in: query
        name: servicio_confirmado
        type: string
      - description: Estado de la reserva
        enum:
        - PENDIENTE
        - RECHAZADO
        - AGENDADO
        - COMPLETADO
        in: query
        name: estado
        type: string
      - description: Tipo de reserva
        enum:
        - mesa
        - bicicleta
        in: query
        name: tipo
        type: string
      - description: Filtrar por estado reservado
        in: query
        name: reservados
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Listar reservas desde base de datos
      tags:
      - Reservas BD
  /bd/reservas/estado:
    patch:
      consumes:
      - application/json
      description: Cambia el estado de una reserva segun las reglas de negocio.
      parameters:
      - description: Nuevo estado de la reserva
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.actualizarEstadoReservaPGRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Actualizar estado de reserva
      tags:
      - Reservas BD
  /bd/reservas/resumen:
    get:
      description: Devuelve el resumen numerico de reservas agendadas del dia, servicios
        completados del dia y acumulado semanal desde el lunes hasta la fecha indicada.
      parameters:
      - description: Fecha a consultar en formato YYYY-MM-DD
        in: query
        name: fecha
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
