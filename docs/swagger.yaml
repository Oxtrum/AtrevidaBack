basePath: /
definitions:
  handlers.activarServicioRequest:
    properties:
      local:
        example: PASEO ARANJUEZ
        type: string
    required:
    - local
    type: object
  handlers.actualizarClienteRequest:
    properties:
      apellido:
        example: Lopez Aguilar
        type: string
      nombre:
        example: Maria Fernanda
        type: string
      numero_telefono:
        example: "+59170011224"
        type: string
    type: object
  handlers.actualizarComboServicioRequest:
    properties:
      costo:
        example: 250
        type: number
      orden:
        example: 1
        type: integer
      servicio_id:
        example: 8
        type: integer
      servicio_texto:
        example: Masaje relajante personalizado
        type: string
      sesiones:
        example: 2
        type: integer
      tiempo:
        example: "01:00"
        type: string
    type: object
  handlers.actualizarEstadoReservaPGRequest:
    properties:
      causa:
        description: Motivo del cambio de estado
        example: Cliente confirmo por WhatsApp
        type: string
      estado:
        description: 'Nuevo estado: PENDIENTE, AGENDADO, RECHAZADO o COMPLETADO'
        example: AGENDADO
        type: string
      id:
        description: ID de la reserva
        example: 44
        type: integer
      precio:
        description: Precio actualizado (opcional)
        example: 350
        type: number
      servicio_confirmado:
        description: Servicio confirmado (opcional, se actualiza si se envia)
        example: Depilacion Laser Piernas
        type: string
      tipo:
        description: 'Tipo de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - estado
    - id
    type: object
  handlers.actualizarLocalHorarioRequest:
    properties:
      dia_semana:
        example: 6
        type: integer
      hora_desde:
        example: "10:00"
        type: string
      hora_hasta:
        example: "16:00"
        type: string
    type: object
  handlers.actualizarLocalRequest:
    properties:
      activo:
        example: true
        type: boolean
      nombre:
        example: PASEO ARANJUEZ
        type: string
    type: object
  handlers.actualizarNotificadoReservaPGRequest:
    properties:
      id:
        description: ID de la reserva
        example: 44
        type: integer
      notificado:
        description: 'Estado de notificacion: true = notificado, false = no notificado'
        example: true
        type: boolean
    required:
    - id
    - notificado
    type: object
  handlers.actualizarReservaPGRequest:
    properties:
      id:
        description: ID de la reserva a actualizar
        example: 44
        type: integer
      local:
        description: Nombre del local (siempre requerido para validar existencia)
        example: SAN MARTIN
        type: string
      nueva_fecha:
        description: Nueva fecha (YYYY-MM-DD), opcional
        example: "2026-05-24"
        type: string
      nueva_hora_desde:
        description: Nueva hora de inicio (HH:MM), opcional
        example: "16:00"
        type: string
      nueva_hora_hasta:
        description: Nueva hora de fin (HH:MM), opcional
        example: "17:00"
        type: string
      nuevas_notas:
        description: Nuevas notas u observaciones, opcional
        example: Reagendada por solicitud del cliente
        type: string
      nuevo_numero_telefono:
        description: Nuevo numero de telefono, opcional
        example: "+59170011224"
        type: string
      nuevo_precio:
        description: Nuevo precio, opcional
        example: 180
        type: number
      nuevo_servicio:
        description: Nuevo nombre del servicio principal (opcional)
        example: Evaluacion corporal
        type: string
      nuevo_servicio_confirmado:
        description: Nuevo servicio confirmado tras evaluacion (opcional)
        example: Evaluacion corporal
        type: string
      nuevo_servicio_solicitado:
        description: Nuevo detalle de lo que solicito el cliente (opcional)
        example: Evaluacion corporal completa
        type: string
      nuevo_tipo:
        description: 'Nuevo tipo de espacio: M (mesa) o B (bicicleta), opcional'
        example: B
        type: string
    required:
    - id
    - local
    type: object
  handlers.actualizarReservaRequest:
    properties:
      cliente:
        description: Nombre del cliente
        example: Maria Lopez
        type: string
      dia:
        description: Dia actual de la reserva
        example: lunes
        type: string
      hora:
        description: Hora actual de la reserva
        example: "09:00"
        type: string
      local:
        description: Nombre del local
        example: SAN MARTIN
        type: string
      nueva_hora_desde:
        description: Nueva hora de inicio (opcional)
        example: "11:00"
        type: string
      nueva_hora_hasta:
        description: Nueva hora de fin (opcional)
        example: "12:00"
        type: string
      nuevo_dia:
        description: Nuevo dia (opcional)
        example: martes
        type: string
      nuevo_servicio:
        description: Nuevo nombre del servicio (opcional)
        example: Evaluacion corporal
        type: string
      nuevo_tipo:
        description: 'Nuevo tipo de espacio: M o B (opcional)'
        example: B
        type: string
      semana:
        description: Semana en formato YYYY-MM-DD
        example: "2026-05-25"
        type: string
      tipo:
        description: 'Tipo actual de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - cliente
    - dia
    - hora
    - local
    - semana
    - tipo
    type: object
  handlers.actualizarServicioRequest:
    properties:
      activo:
        example: true
        type: boolean
      categoria:
        example: Corporal
        type: string
      costo:
        example: 420
        type: number
      nombre:
        example: Depilacion Laser Piernas Premium
        type: string
      requiere_evaluacion:
        example: false
        type: boolean
      sesiones:
        example: 8
        type: integer
      tiempo:
        example: "01:15"
        type: string
      tipo_espacio_requerido:
        example: M
        type: string
    type: object
  handlers.categoriaListResponse:
    properties:
      categorias:
        items:
          $ref: '#/definitions/models.CategoriaPG'
        type: array
      total:
        example: 5
        type: integer
    type: object
  handlers.clienteFiltrosResponse:
    properties:
      apellido:
        example: Lopez
        type: string
      nombre:
        example: Maria
        type: string
      numero_telefono:
        example: "+59170011223"
        type: string
    type: object
  handlers.clienteItemResponse:
    properties:
      cliente:
        $ref: '#/definitions/models.ClientePG'
    type: object
  handlers.clienteListResponse:
    properties:
      clientes:
        items:
          $ref: '#/definitions/models.ClientePG'
        type: array
      filtros:
        $ref: '#/definitions/handlers.clienteFiltrosResponse'
      total:
        example: 1
        type: integer
    type: object
  handlers.comboFiltrosResponse:
    properties:
      categoria:
        example: Corporal
        type: string
      local:
        example: ARANJUEZ
        type: string
      nombre:
        example: relax
        type: string
      sesiones:
        example: 4
        type: integer
    type: object
  handlers.comboListResponse:
    properties:
      combos:
        items:
          $ref: '#/definitions/models.ComboItem'
        type: array
      filtros:
        $ref: '#/definitions/handlers.comboFiltrosResponse'
      total:
        example: 3
        type: integer
    type: object
  handlers.comboServicioItemResponse:
    properties:
      servicio:
        $ref: '#/definitions/models.ComboServicioDetallePG'
    type: object
  handlers.comboServicioListResponse:
    properties:
      combo_id:
        example: 12
        type: integer
      servicios:
        items:
          $ref: '#/definitions/models.ComboServicioDetallePG'
        type: array
      total:
        example: 3
        type: integer
    type: object
  handlers.crearCategoriaRequest:
    properties:
      nombre:
        example: Depilacion Laser
        type: string
    required:
    - nombre
    type: object
  handlers.crearClienteRequest:
    properties:
      apellido:
        example: Lopez
        type: string
      nombre:
        example: Maria
        type: string
      numero_telefono:
        example: "+59170011223"
        type: string
    type: object
  handlers.crearComboServicioRequest:
    properties:
      combo_id:
        example: 12
        type: integer
      costo:
        example: 250
        type: number
      orden:
        example: 1
        type: integer
      servicio_id:
        example: 8
        type: integer
      servicio_texto:
        example: Masaje relajante personalizado
        type: string
      sesiones:
        example: 2
        type: integer
      tiempo:
        example: "01:00"
        type: string
    required:
    - combo_id
    type: object
  handlers.crearLocalHorarioRequest:
    properties:
      dia_semana:
        example: 1
        type: integer
      hora_desde:
        example: "09:00"
        type: string
      hora_hasta:
        example: "18:00"
        type: string
      local_id:
        example: 3
        type: integer
    type: object
  handlers.crearLocalRequest:
    properties:
      espacios:
        description: opcional
        items:
          $ref: '#/definitions/handlers.espacioRequest'
        type: array
      nombre:
        example: SAN MARTIN
        type: string
    required:
    - nombre
    type: object
  handlers.crearReservaPGRequest:
    properties:
      cliente:
        description: Nombre del cliente
        example: Maria Lopez
        type: string
      estado:
        description: 'Estado inicial: PENDIENTE (default), AGENDADO (solo si el servicio
          no requiere evaluacion)'
        example: PENDIENTE
        type: string
      fecha:
        description: Fecha de la reserva (YYYY-MM-DD)
        example: "2026-05-23"
        type: string
      hora_desde:
        description: Hora de inicio (HH:MM)
        example: "15:00"
        type: string
      hora_hasta:
        description: Hora de fin (HH:MM)
        example: "16:00"
        type: string
      local:
        description: Nombre del local
        example: SAN MARTIN
        type: string
      notas:
        description: Notas u observaciones
        example: Primera sesion del plan
        type: string
      numero_telefono:
        description: Numero de telefono del cliente
        example: "+59170011223"
        type: string
      plan_id:
        description: ID del plan asociado (opcional)
        example: 21
        type: integer
      precio:
        description: Precio de la reserva
        example: 350
        type: number
      servicio:
        description: 'Nombre del servicio principal (ej: "Depilacion laser"). Se usa
          como identificador general.'
        example: Depilacion laser
        type: string
      servicio_confirmado:
        description: 'Servicio final confirmado tras evaluacion (ej: "Depilacion Laser
          Piernas"). Si se omite y el servicio no requiere evaluacion, se autocompleta
          con el nombre del servicio encontrado en BD.'
        example: Depilacion Laser Piernas
        type: string
      servicio_id:
        description: ID del servicio seleccionado en BD. Si se envia, se usa para
          validar si requiere evaluacion.
        example: 8
        type: integer
      servicio_solicitado:
        description: 'Detalle de lo que solicito el cliente (ej: "Piernas completas").
          Si se omite, se copia de "servicio".'
        example: Piernas completas
        type: string
      tipo:
        description: 'Tipo de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - cliente
    - fecha
    - hora_desde
    - local
    - numero_telefono
    type: object
  handlers.crearReservaRequest:
    properties:
      cliente:
        description: Nombre del cliente
        example: Maria Lopez
        type: string
      dia:
        description: Dia de la semana (lunes, martes, miercoles, jueves, viernes,
          sabado)
        example: lunes
        type: string
      hora_desde:
        description: Hora de inicio (HH:MM)
        example: "09:00"
        type: string
      hora_hasta:
        description: Hora de fin (HH:MM), opcional
        example: "10:00"
        type: string
      local:
        description: Nombre del local
        example: SAN MARTIN
        type: string
      semana:
        description: Semana en formato YYYY-MM-DD (primer dia de la semana, lunes)
        example: "2026-05-25"
        type: string
      servicio:
        description: 'Nombre del servicio (ej: "Depilacion piernas completas"). Texto
          libre.'
        example: Depilacion piernas completas
        type: string
      tipo:
        description: 'Tipo de espacio: M (mesa) o B (bicicleta)'
        example: M
        type: string
    required:
    - cliente
    - dia
    - hora_desde
    - local
    - semana
    - tipo
    type: object
  handlers.crearServicioRequest:
    properties:
      categoria:
        example: Corporal
        type: string
      costo:
        example: 350
        type: number
      local:
        description: opcional
        example: SAN MARTIN
        type: string
      nombre:
        example: Depilacion Laser Piernas
        type: string
      requiere_evaluacion:
        example: true
        type: boolean
      sesiones:
        example: 6
        type: integer
      tiempo:
        example: "01:00"
        type: string
      tipo_espacio_requerido:
        description: '"M" | "B" | nil'
        example: M
        type: string
    required:
    - categoria
    - nombre
    type: object
  handlers.espacioRequest:
    properties:
      cantidad_espacios:
        example: 6
        minimum: 1
        type: integer
      tipo_espacio:
        example: M
        type: string
    required:
    - cantidad_espacios
    - tipo_espacio
    type: object
  handlers.horarioFiltrosResponse:
    properties:
      dia_semana:
        example: 1
        type: integer
      local_id:
        example: 3
        type: integer
    type: object
  handlers.horarioItemResponse:
    properties:
      horario:
        $ref: '#/definitions/models.LocalHorarioPG'
    type: object
  handlers.horarioListResponse:
    properties:
      filtros:
        $ref: '#/definitions/handlers.horarioFiltrosResponse'
      horarios:
        items:
          $ref: '#/definitions/models.LocalHorarioPG'
        type: array
      total:
        example: 5
        type: integer
    type: object
  handlers.idResponse:
    properties:
      id:
        example: 42
        type: integer
    type: object
  handlers.localItemResponse:
    properties:
      local:
        $ref: '#/definitions/models.LocalConEspacios'
      total:
        example: 1
        type: integer
    type: object
  handlers.localListResponse:
    properties:
      locales:
        items:
          $ref: '#/definitions/models.LocalConEspacios'
        type: array
      total:
        example: 2
        type: integer
    type: object
  handlers.messageResponse:
    properties:
      mensaje:
        example: operacion realizada correctamente
        type: string
    type: object
  handlers.reservaCalendarioResponse:
    properties:
      filtros:
        $ref: '#/definitions/handlers.reservaPGFiltrosResponse'
      reservas:
        items:
          $ref: '#/definitions/models.LocalReservas'
        type: array
      total_locales:
        example: 2
        type: integer
    type: object
  handlers.reservaCreatedResponse:
    properties:
      id:
        example: 44
        type: integer
      mensaje:
        example: Reserva creada correctamente
        type: string
    type: object
  handlers.reservaItemResponse:
    properties:
      reserva:
        $ref: '#/definitions/services.ReservaSimple'
    type: object
  handlers.reservaPGFiltrosResponse:
    properties:
      cliente:
        example: Maria Lopez
        type: string
      estado:
        example: AGENDADO
        type: string
      fecha:
        example: "2026-05-23"
        type: string
      fecha_desde:
        example: "2026-05-19"
        type: string
      fecha_hasta:
        example: "2026-05-24"
        type: string
      local:
        example: SAN MARTIN
        type: string
      numero_telefono:
        example: "+59170011223"
        type: string
      reservados:
        example: true
        type: boolean
      servicio_confirmado:
        example: depilacion laser piernas
        type: string
      servicio_solicitado:
        example: depilacion
        type: string
      tipo:
        example: mesa
        type: string
    type: object
  handlers.reservaResumenResponse:
    properties:
      reservas_agendadas_dia:
        description: Cantidad de reservas agendadas para el dia consultado
        example: 15
        type: integer
      semana:
        allOf:
        - $ref: '#/definitions/handlers.reservaResumenSemanaResponse'
        description: Resumen por dia de la semana desde el lunes hasta la fecha consultada
      servicios_completados_dia:
        description: Cantidad de servicios completados en el dia consultado
        example: 10
        type: integer
    type: object
  handlers.reservaResumenSemanaResponse:
    properties:
      jueves:
        description: Reservas del dia jueves (incluido si la fecha es jueves o posterior)
        example: 5
        type: integer
      lunes:
        description: Reservas del dia lunes (incluido si la fecha es lunes o posterior)
        example: 8
        type: integer
      martes:
        description: Reservas del dia martes (incluido si la fecha es martes o posterior)
        example: 10
        type: integer
      miercoles:
        description: Reservas del dia miercoles (incluido si la fecha es miercoles
          o posterior)
        example: 12
        type: integer
      sabado:
        description: Reservas del dia sabado (incluido si la fecha es sabado o posterior)
        example: 3
        type: integer
      total_reservas:
        description: Total de reservas en la semana (lunes a la fecha consultada)
        example: 45
        type: integer
      viernes:
        description: Reservas del dia viernes (incluido si la fecha es viernes o posterior)
        example: 7
        type: integer
    type: object
  handlers.reservaSimpleListResponse:
    properties:
      reservas:
        items:
          $ref: '#/definitions/services.ReservaSimple'
        type: array
      total:
        example: 15
        type: integer
    type: object
  handlers.servicioFiltrosResponse:
    properties:
      categoria:
        example: Corporal
        type: string
      local:
        example: ARANJUEZ
        type: string
      nombre:
        example: depilacion
        type: string
      requiere_evaluacion:
        example: true
        type: boolean
      sesiones:
        example: 6
        type: integer
    type: object
  handlers.servicioItemResponse:
    properties:
      servicio:
        $ref: '#/definitions/models.ServicioItem'
    type: object
  handlers.servicioListResponse:
    properties:
      filtros:
        $ref: '#/definitions/handlers.servicioFiltrosResponse'
      servicios:
        items:
          $ref: '#/definitions/models.ServicioItem'
        type: array
      total:
        example: 10
        type: integer
    type: object
  models.CategoriaPG:
    properties:
      id:
        example: 4
        type: integer
      nombre:
        example: Corporal
        type: string
    type: object
  models.ClientePG:
    properties:
      apellido:
        example: Lopez
        type: string
      id:
        example: 12
        type: integer
      nombre:
        example: Maria
        type: string
      numero_telefono:
        example: "+59170011223"
        type: string
    type: object
  models.ComboItem:
    properties:
      categoria:
        example: Corporal
        type: string
      costo_total:
        example: "1200"
        type: string
      id:
        example: 12
        type: integer
      local:
        example: ARANJUEZ
        type: string
      nombre:
        example: Relax Total
        type: string
      servicios_incluidos:
        items:
          $ref: '#/definitions/models.ServicioIncluido'
        type: array
      sesiones_totales:
        example: 4
        type: integer
    type: object
  models.ComboServicioDetallePG:
    properties:
      combo_id:
        example: 12
        type: integer
      combo_nombre:
        example: Combo Relax
        type: string
      costo:
        example: 250
        type: number
      id:
        example: 15
        type: integer
      orden:
        example: 1
        type: integer
      servicio_id:
        example: 8
        type: integer
      servicio_nombre:
        example: Masaje relajante personalizado
        type: string
      servicio_texto:
        example: Masaje relajante personalizado
        type: string
      sesiones:
        example: 2
        type: integer
      tiempo:
        example: "01:00"
        type: string
    type: object
  models.LocalConEspacios:
    properties:
      activo:
        example: true
        type: boolean
      espacios:
        items:
          $ref: '#/definitions/models.TipoEspacioLocal'
        type: array
      horarios:
        items:
          $ref: '#/definitions/models.LocalHorarioPG'
        type: array
      id:
        example: 3
        type: integer
      nombre:
        example: SAN MARTIN
        type: string
    type: object
  models.LocalHorarioPG:
    properties:
      activo:
        example: true
        type: boolean
      dia_semana:
        example: 1
        type: integer
      hora_desde:
        example: "09:00"
        type: string
      hora_hasta:
        example: "18:00"
        type: string
      id:
        example: 15
        type: integer
      local_id:
        example: 3
        type: integer
    type: object
  models.LocalReservas:
    properties:
      local:
        example: SAN MARTIN
        type: string
      semanas:
        items:
          $ref: '#/definitions/models.Semana'
        type: array
    type: object
  models.ReservaItem:
    properties:
      actualizado_en:
        example: "2026-05-23T16:04:05Z"
        type: string
      cliente:
        example: Maria Lopez
        type: string
      creado_en:
        example: "2026-05-23T15:04:05Z"
        type: string
      estado:
        example: AGENDADO
        type: string
      notificado:
        example: false
        type: boolean
      numero_telefono:
        example: "+59170011223"
        type: string
      servicio:
        example: Depilacion Laser
        type: string
      servicio_confirmado:
        example: Depilacion Laser Piernas
        type: string
      servicio_solicitado:
        example: Piernas completas
        type: string
      tipo:
        example: M
        type: string
    type: object
  models.ReservaSlot:
    properties:
      dias:
        additionalProperties:
          items:
            $ref: '#/definitions/models.ReservaItem'
          type: array
        type: object
      hora:
        example: "09:00"
        type: string
    type: object
  models.Semana:
    properties:
      reservas:
        items:
          $ref: '#/definitions/models.ReservaSlot'
        type: array
      titulo:
        example: Semana 22
        type: string
    type: object
  models.ServicioIncluido:
    properties:
      costo:
        example: "350"
        type: string
      nombre:
        example: Depilacion Laser Piernas
        type: string
      sesiones:
        example: 6
        type: integer
      tiempo:
        example: "01:00"
        type: string
    type: object
  models.ServicioItem:
    properties:
      categoria:
        example: Corporal
        type: string
      costo:
        example: "350"
        type: string
